<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }

    .tile {
      background: #1e293b;
      border: 1px solid #334155;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      border-color: #4f46e5;
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-running  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-stopped  { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .status-unknown  { background: #64748b; }
    .status-manual   { background: #64748b; }

    .icon-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      color: white;
      border-radius: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="min-h-screen text-slate-100 font-sans">

  <!-- Header -->
  <header class="flex items-center justify-between px-8 py-5 border-b border-slate-800">
    <div class="flex items-center gap-3">
      <svg class="w-7 h-7 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
      </svg>
      <span class="text-xl font-semibold tracking-tight text-white">Pathway</span>
    </div>
    <a href="/admin" title="Admin panel"
       class="p-2 rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </a>
  </header>

  <!-- Main grid -->
  <main class="px-8 py-8">
    <div id="grid"
         class="grid gap-4"
         style="grid-template-columns: repeat(auto-fill, minmax(190px, 1fr))">
    </div>

    <!-- Empty state -->
    <div id="empty" class="hidden flex-col items-center justify-center py-24 text-center">
      <svg class="w-14 h-14 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      <p class="text-slate-400 text-lg font-medium">No services yet</p>
      <p class="text-slate-600 text-sm mt-1">
        Add services via the <a href="/admin" class="text-indigo-400 hover:underline">admin panel</a>,
        or start some Docker containers with published ports.
      </p>
    </div>

    <!-- Loading -->
    <div id="loading" class="flex justify-center py-24">
      <svg class="spinner w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    initDashboard();
  </script>
</body>
</html>
